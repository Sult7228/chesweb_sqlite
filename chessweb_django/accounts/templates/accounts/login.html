<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #3d1a78 100%);
            display: flex; justify-content: center; align-items: center;
            font-family: Arial, sans-serif; color: white;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 40px; width: 360px;
        }
        .logo { text-align: center; font-size: 36px; margin-bottom: 8px; }
        h1 { text-align: center; font-size: 22px; font-weight: 500; margin-bottom: 6px; }
        .subtitle { text-align: center; font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 30px; }
        .field { margin-bottom: 16px; }
        label { font-size: 12px; color: rgba(255,255,255,0.6); display: block; margin-bottom: 6px; }
        input {
            width: 100%; padding: 12px 16px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: white; font-size: 14px;
            outline: none; transition: border 0.2s;
        }
        input:focus { border-color: rgba(150,100,255,0.6); }
        input::placeholder { color: rgba(255,255,255,0.25); }
        .btn {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, #7b4fd4, #4a90d9);
            border: none; border-radius: 10px;
            color: white; font-size: 15px; font-weight: bold;
            cursor: pointer; margin-top: 8px;
        }
        .btn:hover { opacity: 0.85; }
        .error {
            background: rgba(233,69,96,0.2);
            border: 1px solid rgba(233,69,96,0.4);
            border-radius: 8px; padding: 10px 14px;
            font-size: 13px; color: #f88; margin-bottom: 16px;
        }
        .links { text-align: center; margin-top: 20px; font-size: 13px; color: rgba(255,255,255,0.4); }
        .links a { color: rgba(150,100,255,0.9); text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">♟</div>
    <h1>Вход</h1>
    <p class="subtitle">Войдите в свой аккаунт</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <div class="field">
            <label>Имя пользователя</label>
            <input type="text" name="username" placeholder="username" required>
        </div>
        <div class="field">
            <label>Пароль</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn">Войти</button>
    </form>
    <div class="links">
        Нет аккаунта? <a href="/api/register/">Регистрация</a> &nbsp;·&nbsp; <a href="/">На главную</a>
    </div>
</div>
</body>
</html>
